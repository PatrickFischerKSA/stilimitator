<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stilimitator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./vendor/mammoth.browser.min.js"></script>
</head>
<body>
  <main class="page-shell">
    <section class="panel style-tool" id="style-lab">
      <div class="style-title">
        <p class="eyebrow">Stilimitator</p>
        <h1>Text im Stil einer Probe generieren</h1>
      </div>

      <div class="style-upload-row">
        <label class="upload-button" for="style-file">Stilvorgabe hochladen</label>
        <input id="style-file" type="file" accept=".txt,.pdf,.doc,.docx,text/plain,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        <p class="status" id="style-status">Bereit.</p>
      </div>

      <label class="field">
        <span>Storyline / weitere inhaltliche Vorgaben</span>
        <textarea id="style-storyline" rows="9" placeholder="Beschreibe hier Handlung, Figuren, Wendepunkte, Motive oder weitere inhaltliche Vorgaben. Pro Zeile kann ein Erzählschritt stehen."></textarea>
      </label>

      <label class="field">
        <span>Stilvorgabe / Form</span>
        <textarea id="style-input" rows="13" placeholder="Füge hier eine Stilprobe ein oder lade sie oben hoch."></textarea>
      </label>

      <div class="app-hidden" aria-hidden="true">
        <select id="style-language">
          <option selected>Deutsch</option>
          <option>English</option>
          <option>Français</option>
          <option>Italiano</option>
        </select>
        <input id="style-length" type="number" value="360">
        <select id="style-creativity"><option value="balanced" selected>balanced</option></select>
        <input id="style-prompt" type="text">
        <select id="style-perspective"><option value="auto" selected>auto</option></select>
        <select id="style-tense"><option value="auto" selected>auto</option></select>
        <select id="style-structure"><option value="linear" selected>linear</option></select>
        <input id="style-paragraphs" type="number" value="4">
        <select id="style-dialogue"><option value="low" selected>low</option></select>
        <select id="style-ending"><option value="open" selected>open</option></select>
        <input id="style-motifs" type="text">
        <textarea id="style-notes"></textarea>
        <textarea id="style-profile" readonly></textarea>
        <textarea id="style-patterns" readonly></textarea>
        <button id="style-analyze" type="button">Stil analysieren</button>
      </div>

      <div class="button-row style-action-row">
        <button id="style-generate" type="button">Text generieren</button>
        <button id="style-export" type="button" class="button-secondary">Exportieren</button>
        <button id="style-clear" type="button" class="button-secondary">Leeren</button>
      </div>

      <label class="field">
        <span>Output</span>
        <textarea id="style-output" rows="16" readonly placeholder="Der generierte Text erscheint hier."></textarea>
      </label>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
